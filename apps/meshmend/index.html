<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>MeshMend</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar__primary">
          <label class="file-button">
            <input id="stl-file" type="file" accept=".stl,model/stl" />
            <span>Load STL</span>
          </label>
          <button id="fit-view" type="button" disabled>Fit</button>
          <button id="reset-view" type="button" disabled>Reset</button>
        </div>

        <div class="toolbar__toggles" aria-label="Display controls">
          <label>
            <input id="wireframe-toggle" type="checkbox" />
            Wireframe
          </label>
          <label>
            <input id="backface-toggle" type="checkbox" />
            Backfaces
          </label>
          <label class="opacity-control">
            Opacity
            <input
              id="opacity-slider"
              type="range"
              min="0.15"
              max="1"
              step="0.05"
              value="1"
            />
          </label>
        </div>
      </header>

      <main class="viewer-shell">
        <section id="viewer" class="viewer" aria-label="STL viewport">
          <div id="drop-zone" class="drop-zone">
            <div>
              <strong>Load an STL file</strong>
              <span>Select any .stl file or drag it here.</span>
            </div>
          </div>
          <div id="status" class="status" hidden></div>
        </section>

        <aside class="stats-panel" aria-label="Mesh statistics">
          <h1>MeshMend</h1>
          <dl>
            <div>
              <dt>File</dt>
              <dd id="stat-file">None loaded</dd>
            </div>
            <div>
              <dt>Triangles</dt>
              <dd id="stat-triangles">-</dd>
            </div>
            <div>
              <dt>Vertex positions</dt>
              <dd id="stat-vertices">-</dd>
            </div>
            <div>
              <dt>Bounds</dt>
              <dd id="stat-bounds">-</dd>
            </div>
            <div>
              <dt>Center</dt>
              <dd id="stat-center">-</dd>
            </div>
            <div>
              <dt>Source size</dt>
              <dd id="stat-size">-</dd>
            </div>
          </dl>
        </aside>
      </main>
    </div>
  </body>
</html>
