name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxkbcommon-dev libwayland-dev libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/MeshMend-linux-x86_64
          cp target/release/meshmend dist/MeshMend-linux-x86_64/
          tar -czf dist/MeshMend-linux-x86_64.tar.gz -C dist MeshMend-linux-x86_64
          shasum -a 256 dist/MeshMend-linux-x86_64.tar.gz > dist/MeshMend-linux-x86_64.tar.gz.sha256

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/MeshMend-windows-x86_64 | Out-Null
          Copy-Item target/release/meshmend.exe dist/MeshMend-windows-x86_64/
          Compress-Archive -Path dist/MeshMend-windows-x86_64 -DestinationPath dist/MeshMend-windows-x86_64.zip
          Get-FileHash dist/MeshMend-windows-x86_64.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  dist/MeshMend-windows-x86_64.zip" } > dist/MeshMend-windows-x86_64.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            Unsigned developer preview.

            Supported early artifacts:
            - Linux x86_64 tarball
            - Windows x86_64 zip

            macOS builds are manual-only until release signing and notarization are ready.
